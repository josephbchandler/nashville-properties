<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move to Nashville - Passed</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; padding: 24px; max-width: 900px; margin: 0 auto; }

  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .subtitle { color: #888; font-size: 14px; margin-top: 4px; }
  .nav { display: flex; gap: 8px; }
  .nav a, .nav button {
    background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px;
    color: #60a5fa; padding: 8px 16px; font-size: 13px; text-decoration: none; cursor: pointer;
  }
  .nav button { color: #34d399; }
  .nav a:hover, .nav button:hover { border-color: #4a7dff; }

  .list { display: flex; flex-direction: column; gap: 8px; }
  .row {
    background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px;
    padding: 12px 16px; display: flex; gap: 12px; align-items: flex-start;
  }
  .row-main { flex: 1; }
  .name { font-weight: 600; color: #fff; font-size: 14px; margin-bottom: 4px; }
  .note { color: #aaa; font-size: 13px; line-height: 1.4; }
  .del-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #555; opacity: 0.3; padding: 2px 6px; }
  .del-btn:hover { opacity: 1; color: #f87171; }

  .loading { text-align: center; padding: 60px; color: #666; font-size: 14px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; }
  .modal h2 { font-size: 16px; color: #fff; margin-bottom: 16px; }
  .modal label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; margin-top: 12px; letter-spacing: 0.5px; }
  .modal input, .modal textarea { width: 100%; background: #252836; border: 1px solid #2a2d3a; border-radius: 6px; color: #e0e0e0; padding: 8px 10px; font-size: 13px; outline: none; font-family: inherit; }
  .modal input:focus, .modal textarea:focus { border-color: #4a7dff; }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
  .modal-actions button { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; }
  .modal-actions .save { background: #34d399; color: #000; font-weight: 600; }
  .modal-actions .cancel { background: #252836; color: #888; border: 1px solid #2a2d3a; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Move to Nashville — Passed On</h1>
    <div class="subtitle" id="subtitle">Loading...</div>
  </div>
  <div class="nav">
    <button onclick="showAddModal()">+ Add</button>
    <a href="index.html">Table</a>
    <a href="map.html">Map</a>
  </div>
</div>

<div id="list" class="loading">Loading passed properties...</div>
<div id="modal" style="display:none"></div>

<script>
const BIN_ID = '69dc60e5856a6821892957ac';
const BIN_KEY = '$2a$10$SRUgPWxtOoUNlzr7cKyM2eC.k7uhVXgyf/GUrpd7jsoi5nWQVRCj6';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

let PASSED = [];
let loadedFromCloud = false;

function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadAll() {
  try {
    const resp = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': BIN_KEY } });
    const json = await resp.json();
    PASSED = (json.record && json.record.passed) || [];
    loadedFromCloud = true;
  } catch(e) { console.error('Load failed:', e); }
  render();
}

async function saveAll() {
  if (!loadedFromCloud) { console.warn('not loaded yet'); return; }
  try {
    // Read-modify-write to preserve properties + states
    const resp = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': BIN_KEY } });
    const json = await resp.json();
    const full = json.record || {};
    full.passed = PASSED;
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify(full)
    });
  } catch(e) { console.error('Save failed:', e); }
}

function render() {
  document.getElementById('subtitle').textContent = `${PASSED.length} properties researched but not on the active list`;
  const list = document.getElementById('list');
  list.className = 'list';
  if (!PASSED.length) { list.innerHTML = '<div class="loading">No passed properties yet.</div>'; return; }
  list.innerHTML = PASSED.map((p, i) => `
    <div class="row">
      <div class="row-main">
        <div class="name">${esc(p.name)}</div>
        <div class="note">${esc(p.note)}</div>
      </div>
      <button class="del-btn" onclick="deletePassed(${i})" title="Remove">🗑</button>
    </div>
  `).join('');
}

function showAddModal() {
  const modal = document.getElementById('modal');
  modal.style.display = '';
  modal.className = 'modal-bg';
  modal.innerHTML = `<div class="modal">
    <h2>Add to Passed</h2>
    <label>Property Name</label>
    <input id="ap_name" placeholder="e.g. Some Apartments LLC">
    <label>Reason</label>
    <textarea id="ap_note" placeholder="Why did we pass on this?"></textarea>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="addPassed()">Add</button>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('ap_name').focus(), 0);
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function addPassed() {
  const name = document.getElementById('ap_name').value.trim();
  const note = document.getElementById('ap_note').value.trim();
  if (!name) { alert('Name required.'); return; }
  PASSED.push({ name, note });
  saveAll();
  closeModal();
  render();
}

function deletePassed(i) {
  if (!confirm('Remove ' + PASSED[i].name + '?')) return;
  PASSED.splice(i, 1);
  saveAll();
  render();
}

loadAll();
</script>
</body>
</html>
